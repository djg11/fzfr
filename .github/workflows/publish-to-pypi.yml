name: Publish Python Package to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for trusted publishing (OIDC) -- no API token needed
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (build toolchain)
        uses: actions/setup-python@v5
        with:
          # Build toolchain runs on 3.10 (ruff, build, setuptools all require 3.7+)
          # The built remotely script itself targets Python 3.6 on the remote.
          python-version: "3.10"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build single-file script
        run: python3 scripts/build_single_file.py

      - name: Verify script runs under Python 3.6
        uses: actions/setup-python@v5
        with:
          python-version: "3.6"
      - run: python3.6 remotely --version

      - name: Switch back to 3.10 for packaging
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Rename remotely -> remotely.py for packaging
        # setuptools requires a .py extension to import the module and read
        # VERSION via the dynamic version attr directive in pyproject.toml.
        run: cp remotely remotely.py

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
