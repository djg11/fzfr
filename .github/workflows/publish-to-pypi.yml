name: Publish Python Package to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for trusted publishing (OIDC) — no API token needed
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build single-file script
        run: python3 scripts/build_single_file.py

      - name: Rename remotely → remotely.py for packaging
        # setuptools requires a .py extension to import the module and read
        # VERSION via the dynamic version attr directive in pyproject.toml.
        # The installed binary at ~/.local/bin/remotely has no extension regardless
        # — pip names it after the [project.scripts] key, not the source file.
        run: cp remotely remotely.py

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
