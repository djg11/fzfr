on:
  workflow_dispatch: {}
  pull_request: {}
  push:
    branches:
    - main
    - master
  schedule:
  # random HH:MM to avoid a load spike on GitHub Actions at 00:00
  - cron: 22 2 * * *
name: Semgrep
jobs:
  semgrep:
    name: semgrep/ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    steps:
    - uses: actions/checkout@v4

    # Semgrep and ruff both require Python 3.7+; use 3.10 as the dev baseline.
    - name: Set up Python 3.10 (dev toolchain)
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Run Semgrep platform scan
      uses: docker://semgrep/semgrep
      with:
        entrypoint: semgrep
        args: ci

    - name: Run custom rules
      uses: docker://semgrep/semgrep
      with:
        entrypoint: semgrep
        args: scan --config .semgrep/semgrep.yml --error .
