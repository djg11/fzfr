rules:
  # ===========================================================================
  # REGRESSION GUARDS
  # These patterns don't exist in the codebase today but would be critical
  # bugs if introduced.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  #  subprocess with shell=True
  #  Any subprocess call with shell=True is dangerous in fzfr because user-
  #  controlled values (paths, queries, extensions) flow into these calls.
  #  All legitimate subprocess usage in the codebase uses list-form args.
  # ---------------------------------------------------------------------------
  - id: fzfr-subprocess-shell-true
    patterns:
      - pattern: subprocess.$FUNC(..., shell=True, ...)
    message: >
      subprocess called with shell=True. fzfr's quoting discipline requires
      list-form subprocess calls for local commands. shell=True is only
      acceptable for pre-quoted SSH remote command fragments, and must be
      explicitly documented.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-78

  # ---------------------------------------------------------------------------
  # os.system() — always runs through a shell
  # ---------------------------------------------------------------------------
  - id: fzfr-no-os-system
    patterns:
      - pattern: os.system(...)
    message: >
      os.system() runs through a shell. Use subprocess with a list of
      arguments instead.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-78

  # ---------------------------------------------------------------------------
  # Hardcoded credentials / tokens
  # Catches common patterns like token = "...", password = "..." with a
  # non-empty string literal value.
  # ---------------------------------------------------------------------------
  - id: fzfr-hardcoded-secret
    patterns:
      - pattern: $KEY = "$VALUE"
      - metavariable-regex:
          metavariable: $KEY
          regex: (?i)(token|secret|password|passwd|api_key|apikey|auth)
      - metavariable-regex:
          metavariable: $VALUE
          regex: .{8,}
    message: >
      Possible hardcoded secret in '$KEY'. Use environment variables or a
      secrets manager instead.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-798

  # ---------------------------------------------------------------------------
  # Unsafe tempfile creation — using tempfile.mktemp() (TOCTOU)
  # fzfr correctly uses mkstemp/mkdtemp everywhere, but guard against
  # a regression to the insecure mktemp().
  # ---------------------------------------------------------------------------
  - id: fzfr-no-mktemp
    patterns:
      - pattern: tempfile.mktemp(...)
    message: >
      tempfile.mktemp() has a TOCTOU race. Use tempfile.mkstemp() or
      tempfile.mkdtemp() as used elsewhere in this codebase.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-377

  # ---------------------------------------------------------------------------
  # SSH remote command built without shlex.quote / shlex.join
  # In remote.py and backends.py, every value interpolated into a remote
  # shell command string MUST go through shlex.quote or shlex.join.
  # Flag f-strings that embed variables directly into ssh command strings.
  # ---------------------------------------------------------------------------
  - id: fzfr-ssh-unquoted-fstring
    patterns:
      - pattern: |
          subprocess.$FUNC(["ssh", ..., f"...{$VAR}..."], ...)
      - pattern-not: |
          subprocess.$FUNC(["ssh", ..., shlex.join(...)], ...)
    message: >
      SSH command contains an f-string with an unquoted variable. Variables
      interpolated into remote shell commands must be wrapped with shlex.quote()
      or built entirely with shlex.join(). An attacker-controlled path or query
      could inject arbitrary shell commands on the remote host.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-78

  # ---------------------------------------------------------------------------
  # Path traversal — constructing paths from user input without safety check
  # Catches places where a user-supplied string is joined with Path() and
  # used directly in a file operation without going through is_safe_subpath.
  # ---------------------------------------------------------------------------
  - id: fzfr-path-traversal-open
    patterns:
      - pattern: open(str(Path($BASE) / $USER_INPUT), ...)
      - pattern-not-inside: |
          if ...:
            ...
    message: >
      Path constructed from user input is opened directly. Verify that
      is_safe_subpath() has been called on the resolved path before this open()
      to prevent directory traversal outside the search root.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-22

  # ---------------------------------------------------------------------------
  # assert used for security checks
  # Python's assert is disabled with -O (optimise flag). Security-relevant
  # checks must use explicit if/raise or sys.exit().
  # (proc.stdout asserts are fine; flag assert on path/permission checks.)
  # ---------------------------------------------------------------------------
  - id: fzfr-assert-security-check
    patterns:
      - pattern: assert $X.is_relative_to(...)
      - pattern: assert $X.is_symlink() == False
      - pattern: assert not $X.is_symlink()
    message: >
      assert is disabled when Python is run with -O. Replace security-relevant
      assertions with explicit if/raise or sys.exit() checks.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-617

  # ---------------------------------------------------------------------------
  # chmod giving world-readable permissions to sensitive files
  # Session dirs, known_hosts, frozen scripts must all be 0o700 or 0o600.
  # Flag any chmod that sets world-readable bits (o+r = 0o004).
  # ---------------------------------------------------------------------------
  - id: fzfr-world-readable-chmod
    patterns:
      - pattern: $PATH.chmod($MODE)
      - metavariable-regex:
          metavariable: $MODE
          regex: "0o[0-7][0-7][4-7]"   # any mode with world-read bit set
    message: >
      chmod sets world-readable permissions. Session files (frozen scripts,
      known_hosts, state files) must use 0o600 or 0o700. Verify this is
      intentional.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-732

  # ---------------------------------------------------------------------------
  # Broad exception suppression hiding security failures
  # bare `except: pass` or `except Exception: pass` in security-sensitive
  # code silently swallows failures that should surface to the caller.
  # ---------------------------------------------------------------------------
  - id: fzfr-silent-exception-security
    patterns:
      - pattern: |
          try:
            ...
          except:
            pass
      - pattern: |
          try:
            ...
          except Exception:
            pass
    message: >
      Bare except/pass silently swallows all exceptions, including security-
      relevant failures (permission errors, SSH auth failures, path resolution
      errors). Add at minimum a comment explaining why failure is safe to
      ignore here, or log/surface the error.
    languages: [python]
    severity: INFO
    metadata:
      category: security
      cwe: CWE-390

  # ===========================================================================
  # TARGETED RULES — based on actual patterns in this codebase
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # SSH remote command injection
  # _build_remote_cmd and _upload_remote_script build shell strings that run
  # on the remote host. Any variable interpolated without shlex.quote is
  # potential RCE on the remote machine.
  # ---------------------------------------------------------------------------
  - id: fzfr-remote-cmd-unquoted-var
    patterns:
      - pattern: f"...{$VAR}..."
      - pattern-not: f"...{shlex.quote($VAR)}..."
      - pattern-not: f"...{shlex.join($VAR)}..."
      - pattern-not-regex: \{(safe_base|fd_cmd|grep_cmd|rga_cmd|fd_grep_cmd)\}
      - pattern-inside: |
          def _build_remote_cmd(...):
            ...
    message: >
      Unquoted variable in remote shell command string inside _build_remote_cmd.
      Wrap with shlex.quote() or shlex.join().
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-78

  - id: fzfr-upload-cmd-unquoted-var
    patterns:
      - pattern: f"...{$VAR}..."
      - pattern-not: f"...{shlex.quote($VAR)}..."
      - pattern-inside: |
          def _upload_remote_script(...):
            ...
    message: >
      Unquoted variable in the remote install_cmd shell string inside
      _upload_remote_script. Even though the value is currently derived from a
      SHA256 hash (safe), the pattern must use shlex.quote() so it stays safe
      if the derivation ever changes.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-78

  # ---------------------------------------------------------------------------
  # exclude_patterns used without validation
  # Extension strings go through _parse_extensions() which enforces
  # alphanumeric-only. exclude_patterns from config/CLI do not — they flow
  # directly into fd -E and rga --exclude args.
  # ---------------------------------------------------------------------------
  - id: fzfr-exclude-pattern-no-validation
    patterns:
      - pattern: |
          for $P in $PATTERNS:
              $ARGS += ["-E", $P]
      - pattern-not-inside: |
          def _parse_extensions(...):
            ...
    message: >
      exclude_patterns values passed to fd -E without sanitisation. Unlike
      extensions (which go through _parse_extensions), exclude patterns accept
      arbitrary glob strings. Consider rejecting patterns containing shell
      metacharacters before they reach remote shell commands.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-78

  # ---------------------------------------------------------------------------
  # State file bypass — _load_state enforces the WORK_BASE boundary.
  # Direct json.loads(Path(...).read_text()) calls skip that check entirely.
  # ---------------------------------------------------------------------------
  - id: fzfr-state-read-bypass
    patterns:
      - pattern: json.loads(Path($P).read_text())
      - pattern-not-inside: |
          def _load_state(...):
            ...
    message: >
      JSON file read directly with Path.read_text(), bypassing the WORK_BASE
      boundary check in _load_state(). State paths come from fzf argv and
      could be attacker-controlled. Use _load_state() instead.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-22

  # ---------------------------------------------------------------------------
  # fzf placeholder accidentally quoted
  # fzf expands {} and {q} before passing to the sub-shell. Quoting them
  # causes double-escaping and breaks filenames with spaces or special chars.
  # This is the most common mistake when editing fzf --bind strings.
  # ---------------------------------------------------------------------------
  - id: fzfr-fzf-placeholder-quoted
    patterns:
      - pattern: $X + "'{q}'" + $Y
      - pattern: $X + "'{}'" + $Y
      - pattern: $X + "'{+}'" + $Y
    message: >
      fzf placeholder is quoted inside a bind/preview string. Leave {}, {q},
      {+} unquoted — fzf shell-escapes them automatically.
    languages: [python]
    severity: ERROR
    metadata:
      category: correctness

  # ---------------------------------------------------------------------------
  # subprocess.run to ssh without timeout
  # A hung SSH connection blocks the fzf preview pane indefinitely.
  # Flag ssh calls in run() (blocking) but not Popen() (non-blocking).
  # ---------------------------------------------------------------------------
  - id: fzfr-ssh-call-no-timeout
    patterns:
      - pattern: subprocess.run(["ssh", ...], ...)
      - pattern-not: subprocess.run(["ssh", ...], ..., timeout=..., ...)
      - pattern-not: subprocess.run(["ssh", "-O", "exit", ...], ...)
    message: >
      subprocess.run(["ssh", ...]) has no timeout. A hung SSH host will block
      the fzf preview pane. Add timeout= or set ConnectTimeout in _ssh_opts().
    languages: [python]
    severity: WARNING
    metadata:
      category: reliability

  # ---------------------------------------------------------------------------
  # WORK_BASE subpath created without symlink check
  # The double-symlink guard runs at import time for WORK_BASE itself.
  # New subdirectories created under it re-open the TOCTOU window unless
  # _assert_not_symlink is called on the new path too.
  # ---------------------------------------------------------------------------
  - id: fzfr-workbase-mkdir-no-symlink-check
    patterns:
      - pattern: |
          $PATH = WORK_BASE / $NAME
          ...
          $PATH.mkdir(...)
      - pattern-not: |
          $PATH = WORK_BASE / $NAME
          ...
          _assert_not_symlink($PATH)
          ...
          $PATH.mkdir(...)
      - pattern-not-inside: |
          def _get_work_base(...):
            ...
    message: >
      Directory created under WORK_BASE without a preceding
      _assert_not_symlink() check. WORK_BASE lives in /dev/shm which is
      world-writable — an attacker could pre-place a symlink at $PATH to
      redirect writes. Call _assert_not_symlink($PATH) before mkdir().
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-362
