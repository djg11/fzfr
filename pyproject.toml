[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "fzfr"
# To release: update VERSION in fzfr.py only — pyproject.toml stays unchanged.
dynamic = ["version"]
description = "Fuzzy file search for local and remote filesystems"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
keywords = ["fzf", "fuzzy", "search", "ssh", "remote", "terminal", "cli"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Utilities",
]

# NOTE: [project.scripts] requires the script to be importable as a Python
# module. Rename fzfr → fzfr.py in the repo before publishing to PyPI.
# The installed binary at ~/.local/bin/fzfr has no extension regardless.
# The busybox dispatch (sys.argv[0]) works correctly with pip-installed
# console scripts since pip names each entry point after its key.
[project.scripts]
fzfr                = "fzfr:main"
fzfr-preview        = "fzfr:main"
fzfr-open           = "fzfr:main"
fzfr-remote-reload  = "fzfr:main"
fzfr-remote-preview = "fzfr:main"
fzfr-copy           = "fzfr:main"

[project.urls]
Homepage   = "https://github.com/djg11/fzfr"
Repository = "https://github.com/djg11/fzfr"
Issues     = "https://github.com/djg11/fzfr/issues"

[tool.setuptools]
py-modules = ["fzfr"]

[tool.setuptools.dynamic]
version = {attr = "fzfr.VERSION"}

[tool.ruff]
target-version = "py310"
line-length    = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (unused imports, undefined names, etc.)
    "I",    # isort (import ordering)
    "UP",   # pyupgrade (modern Python syntax)
    "B",    # flake8-bugbear (likely bugs and design issues)
    "SIM",  # flake8-simplify (simplifiable code patterns)
    "TID",  # flake8-tidy-imports (banned / absolute imports)
]
ignore = [
    "E501",  # line too long -- handled by ruff format, not lint
    "B006",  # mutable default argument -- used intentionally in dataclasses
    "B007",  # loop control variable not used in body -- common in fzf callback stubs
    "SIM102",# nested if -> combined -- sometimes less readable when conditions are long
    "SIM108",# ternary -- sometimes less readable than if/else
    "UP007", # X | Y union syntax -- keep Optional[X] for clarity in public APIs
]

[tool.ruff.lint.isort]
known-first-party = ["fzfr"]
force-single-line = false
lines-after-imports = 2

[tool.ruff.format]
# Match the project's existing style
quote-style            = "double"
indent-style           = "space"
skip-magic-trailing-comma = false
line-ending            = "auto"
