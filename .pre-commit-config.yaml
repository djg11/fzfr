# Pre-commit hooks for remotely.
# Optimized for Gentoo Musl / Python 3.6 compatibility.
# Note: ruff is disabled here as it requires Python 3.7+ to run.

repos:
  - repo: local
    hooks:
      - id: trailing-whitespace
        name: trailing whitespace
        entry: python3 -c 'import sys; [open(f, "rb+").write(open(f, "rb").read().rstrip() + b"\n") for f in sys.argv[1:]]'
        language: system
        types: [text]
        exclude: '\.md$'

      - id: check-json
        name: check json
        entry: python3 -m json.tool
        language: system
        types: [json]
        files: '^(src/|tests/|\.config/)'

      - id: check-toml
        name: check toml
        entry: python3 -c 'import sys, toml; [toml.load(open(f)) for f in sys.argv[1:]]'
        language: system
        types: [toml]

      - id: check-yaml
        name: check yaml
        entry: python3 -c 'import sys, yaml; [yaml.safe_load(open(f)) for f in sys.argv[1:]]'
        language: system
        types: [yaml]
