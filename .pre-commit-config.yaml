# Pre-commit hooks for remotely.
# Dev toolchain requires Python 3.10+. All hooks run under the venv python.
# Install once with: make install-hooks

repos:
  - repo: local
    hooks:
      # -- Formatting and linting (ruff requires Python 3.7+ to run) ----------

      - id: ruff-check
        name: ruff lint
        entry: ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        pass_filenames: true

      # -- Whitespace ----------------------------------------------------------

      - id: trailing-whitespace
        name: trailing whitespace
        entry: python3 -c 'import sys; [open(f, "rb+").write(open(f, "rb").read().rstrip() + b"\n") for f in sys.argv[1:]]'
        language: system
        types: [text]
        exclude: '\.md$'

      # -- Config file syntax --------------------------------------------------

      - id: check-json
        name: check json
        entry: python3 -m json.tool
        language: system
        types: [json]
        files: '^(src/|tests/|\.config/)'

      - id: check-toml
        name: check toml
        entry: python3 -c 'import sys, tomllib; [tomllib.loads(open(f).read()) for f in sys.argv[1:]]'
        language: system
        types: [toml]

      - id: check-yaml
        name: check yaml
        entry: python3 -c 'import sys, yaml; [yaml.safe_load(open(f)) for f in sys.argv[1:]]'
        language: system
        types: [yaml]

      # -- Build safety --------------------------------------------------------

      - id: check-imports
        name: check late imports
        entry: python3 scripts/check_imports.py
        language: system
        pass_filenames: false
        files: '^src/remotely/.*\.py$'
